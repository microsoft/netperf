name: Custom Tasks

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Windows OS Version'
        required: false
        default: "2022"
        type: choice
        options:
          - "2025"
          - "2022"
          - "2019"

permissions: write-all

jobs:
  upload-core-dmp:
    runs-on:
    - self-hosted
    - lab
    - os-ubuntu-20.04
    - x64
    steps:
      - name: Upload core dump
        run: echo "Upload all files from /var/lib/apport/coredump"
      - name: Upload core dump
        uses: actions/upload-artifact@v2
        with:
          name: core-dump
          path: /var/lib/apport/coredump/*
